<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catur AI</title>
    <link rel="stylesheet" href="/src/style.css" />
    <!-- Favicon (browser tab) -->
    <link rel="icon" href="/Chess/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/Chess/favicon.svg" />
    <link rel="icon" type="image/png" href="/Chess/favicon.png" />

    <!-- Apple / mobile -->
    <link rel="apple-touch-icon" href="/Chess/apple-touch-icon.png" />

    <!-- (optional tapi bagus) -->
    <meta name="theme-color" content="#07111f" />
  </head>
  <body>
    <div id="app">
      <!-- HEADER -->
      <div id="appbar">
        <div class="brand">
          <span class="brand-icon">♟</span>
          <span>Catur</span>
        </div>
        <div class="menu-icon">☰</div>
      </div>

      <div class="player-card bot-card">
        <div class="turn-indicator"></div>
        <div class="avatar-wrap">
          <div class="avatar bot-avatar">
            <img src="/Chess/avatar/avatar6.svg" alt="bot" />
          </div>
          <span class="status-dot"></span>
        </div>
        <div class="player-info">
          <div class="player-name">AI Catur</div>
          <div class="player-sub">
            Level <span id="levelLabel">Casual</span>
          </div>
          <div id="botStatusText" class="bot-status-text">Yuk mulai bro..</div>
          <div id="botCaptured" class="captured captured-row"></div>
        </div>
        <select id="level">
          <option value="1">Belajaran</option>
          <option value="2" selected>Pemula</option>
          <option value="3">Lumayan</option>
          <option value="4">Jago</option>
        </select>
      </div>

      <!-- BOARD -->
      <div id="board-wrap">
        <div id="eval-bar">
          <div id="eval-fill"></div>
          <div id="eval-score">0.0</div>
        </div>
        <div id="board"></div>
      </div>

      <div class="player-card user-card">
        <div class="turn-indicator"></div>
        <div class="avatar-wrap">
          <div class="avatar user-avatar">
            <img src="/Chess/avatar/avatar11.svg" alt="user" />
          </div>
          <span class="status-dot"></span>
        </div>
        <div class="player-info">
          <div class="player-name">Kamu</div>
          <div id="status" class="player-sub">Siap</div>
          <div id="userCaptured" class="captured captured-row"></div>
        </div>
        <div id="eval-chip">0.0</div>
      </div>

      <!-- BOTTOM BAR -->
      <div id="bottom-bar">
        <button
          id="newGame"
          class="tool"
          title="New Game"
          aria-label="New Game"
        >
          <span class="icon">
            <svg viewBox="0 0 24 24">
              <path d="M5 4v16M6 5h11l-2 4 2 4H6" />
            </svg>
          </span>
        </button>

        <button id="undo" class="tool" title="Undo" aria-label="Undo">
          <span class="icon">
            <svg viewBox="0 0 24 24">
              <path d="M9 7l-5 5 5 5" />
              <path d="M4 12h9a5 5 0 1 1 0 10h-2" />
            </svg>
          </span>
        </button>

        <button id="hint" class="tool" title="Hint" aria-label="Hint">
          <span class="icon">
            <svg viewBox="0 0 24 24">
              <path d="M9 18h6" />
              <path d="M10 22h4" />
              <path
                d="M12 2a7 7 0 0 0-4 12c.8.7 1 1.3 1 2h6c0-.7.2-1.3 1-2A7 7 0 0 0 12 2z"
              />
              <path d="M12 6v3" />
              <path d="M12 13h.01" />
            </svg>
          </span>
        </button>
      </div>

      <div id="hintText">Hint: -</div>
    </div>

    <div id="confirmModal" class="modal hidden">
      <div class="modal-card">
        <div class="modal-icon">♟</div>
        <div class="modal-title">Start new game?</div>
        <div class="modal-text">Your current game will be reset.</div>
        <div class="modal-actions">
          <button id="cancelNewGame" class="modal-btn secondary">Cancel</button>
          <button id="confirmNewGame" class="modal-btn danger">New Game</button>
        </div>
      </div>
    </div>

    <!-- SETTINGS MODAL -->
    <div id="settingsModal" class="modal hidden">
      <div class="modal-card">
        <div class="modal-title">Settings</div>

        <div style="margin-top: 12px; text-align: left">
          <div style="font-size: 13px; margin-bottom: 6px">Board Theme</div>
          <select id="boardThemeSelect" class="settings-select">
            <option value="green">Hijau</option>
            <option value="brown">Kayu</option>
            <option value="blue">Koran</option>
          </select>
        </div>

        <div class="modal-actions" style="margin-top: 18px">
          <button id="closeSettings" class="modal-btn secondary">Close</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
